# -----------------------------------------------------------------------------
# CONTRACT 1 OF 6 — dim_customer
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:dim_customer
info:
  title: Customer Dimension Table
  version: 1.0.0
  description: >
    SCD Type-2 slowly changing dimension for retail customers.
    One row per customer per effective period; is_current=TRUE marks the
    active record.  Conforms to the gold layer of the RetailCo warehouse.
  owner: data-engineering-team
  contact:
    name: Data Engineering Team
    email: data-engineering@retailco.com
  tags:
    - dimension
    - customer
    - SCD2
    - PII

servers:
  production:
    type: postgres
    host: warehouse-prod.retailco.internal
    port: 5432
    database: retaildw
    schema: warehouse
  mirror_dq:
    type: postgres
    host: localhost
    port: 5432
    database: retaildw_dq
    schema: warehouse

models:
  dim_customer:
    description: One row per customer per effective period (SCD Type-2)
    type: table
    fields:
      customer_key:
        type: bigint
        required: true
        unique: true
        primary: true
        description: Surrogate PK generated by the ETL layer
        constraints:
          - type: not_null
          - type: unique
          - type: range
            minimum: 1
            maximum: 200000

      customer_id:
        type: varchar(15)
        required: true
        description: Business natural key — format CUS[digits]
        constraints:
          - type: not_null
          - type: pattern
            regex: "^CUS[0-9]+$"
          - type: length
            minimum: 5
            maximum: 15

      customer_name:
        type: varchar(50)
        required: true
        classification: PII
        description: Full customer name
        constraints:
          - type: not_null
          - type: length
            minimum: 3
            maximum: 50

      email:
        type: varchar(100)
        required: false         # opt-out customers may have null
        classification: PII
        description: Customer email address; null for marketing opt-outs
        constraints:
          - type: not_null
            mostly: 0.99        # 1% null budget for opt-outs
          - type: pattern
            regex: "^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
            mostly: 0.99
          - type: length
            maximum: 100

      city:
        type: varchar(50)
        required: true
        description: Customer city
        constraints:
          - type: not_null
          - type: length
            minimum: 2
            maximum: 50

      state:
        type: char(2)
        required: true
        description: US state code (2-character ISO)
        constraints:
          - type: not_null
          - type: length
            minimum: 2
            maximum: 2

      zip_code:
        type: integer
        required: true
        description: US 5-digit zip code stored as integer
        constraints:
          - type: range
            minimum: 10000
            maximum: 99999

      customer_segment:
        type: varchar(20)
        required: true
        description: Customer value segment
        constraints:
          - type: not_null
          - type: enum
            values: [Standard, Budget, Premium]

      effective_date:
        type: date
        required: true
        description: Date from which this record version is valid
        constraints:
          - type: not_null
          - type: range
            minimum: "2020-01-01"
            maximum: "2030-12-31"

      expiry_date:
        type: date
        required: true
        description: Date on which this version was superseded (9999-12-31 for current)
        constraints:
          - type: not_null
          - type: range
            minimum: "2020-01-01"
            maximum: "9999-12-31"

      is_current:
        type: boolean
        required: true
        description: TRUE for the currently active version of a customer record
        constraints:
          - type: not_null
          - type: enum
            values: [true, false]

quality:
  type: great-expectations
  specification:
    suite: dim_customer_suite
    checkpoint: retail_dw_checkpoint

servicelevels:
  availability:
    description: Table available by 06:00 UTC daily after ETL completion
    percentage: "99.9%"
  freshness:
    description: Data reflects source CRM state as of prior business day
    threshold: 24h
  completeness:
    description: All required fields (customer_key, customer_id, customer_name, effective_date) 100% populated
    percentage: "100%"
  accuracy:
    description: email field passes format validation at 99% threshold
    percentage: "99%"
  uniqueness:
    description: customer_key globally unique; at most one is_current=TRUE per customer_id
    percentage: "100%"

rules:
  - id: R-001
    dimension: Completeness
    severity: critical
    description: customer_key, customer_id, customer_name must never be null
  - id: R-002
    dimension: Completeness
    severity: high
    description: email must be non-null for at least 99% of rows
  - id: R-003
    dimension: Validity
    severity: high
    description: email must match RFC-format regex for at least 99% of rows
  - id: R-004
    dimension: Validity
    severity: high
    description: customer_segment must be one of [Standard, Budget, Premium]
  - id: R-005
    dimension: Uniqueness
    severity: critical
    description: Exactly one is_current=TRUE row per customer_id at all times

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial contract definition for Month 4 deliverable


# -----------------------------------------------------------------------------
# CONTRACT 2 OF 6 — dim_product
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:dim_product
info:
  title: Product Dimension Table
  version: 1.0.0
  description: >
    Static product catalog dimension.  One row per active or inactive SKU.
    Used for product-level revenue, margin, and inventory analysis.
  owner: data-engineering-team
  contact:
    name: Data Engineering Team
    email: data-engineering@retailco.com
  tags:
    - dimension
    - product
    - catalog

servers:
  production:
    type: postgres
    host: warehouse-prod.retailco.internal
    port: 5432
    database: retaildw
    schema: warehouse

models:
  dim_product:
    description: One row per product SKU
    type: table
    fields:
      product_key:
        type: bigint
        required: true
        unique: true
        primary: true
        description: Surrogate PK
        constraints:
          - type: not_null
          - type: unique
          - type: range
            minimum: 1
            maximum: 50000

      product_id:
        type: varchar(20)
        required: true
        unique: true
        description: Business natural key — format PROD[digits]
        constraints:
          - type: not_null
          - type: unique
          - type: pattern
            regex: "^PROD[0-9]+$"

      product_name:
        type: varchar(100)
        required: true
        description: Full product name
        constraints:
          - type: not_null
          - type: length
            minimum: 3
            maximum: 100

      category:
        type: varchar(50)
        required: true
        description: Top-level product category
        constraints:
          - type: not_null

      subcategory:
        type: varchar(50)
        required: true
        description: Sub-category for drill-down reporting
        constraints:
          - type: not_null

      brand:
        type: varchar(50)
        required: true
        description: Brand name
        constraints:
          - type: not_null

      list_price:
        type: decimal(12,2)
        required: true
        description: Published retail selling price; must be positive
        constraints:
          - type: not_null
          - type: range
            minimum: 0.01
            maximum: 100000

      cost_price:
        type: decimal(12,2)
        required: false
        description: Unit cost of goods; must be less than list_price
        constraints:
          - type: range
            minimum: 0
            maximum: 100000
          - type: cross_field
            rule: cost_price < list_price
            severity: high

      is_active:
        type: boolean
        required: true
        description: FALSE for discontinued products retained for historical analysis
        constraints:
          - type: not_null
          - type: enum
            values: [true, false]

quality:
  type: great-expectations
  specification:
    suite: dim_product_suite
    checkpoint: retail_dw_checkpoint

servicelevels:
  freshness:
    description: Product master data refreshed weekly from source ERP
    threshold: 7d
  completeness:
    description: Required fields 100% populated
    percentage: "100%"
  accuracy:
    description: list_price > 0 for all active products; cost_price < list_price
    percentage: "99%"

rules:
  - id: R-006
    dimension: Validity
    severity: high
    description: list_price must be greater than 0 for all products
  - id: R-007
    dimension: Accuracy
    severity: medium
    description: cost_price must be less than list_price where list_price > 0

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial contract definition


# -----------------------------------------------------------------------------
# CONTRACT 3 OF 6 — dim_store
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:dim_store
info:
  title: Store Dimension Table
  version: 1.0.0
  description: >
    Physical retail location dimension.  One row per store.
    Used for geographic analysis, regional roll-ups, and store-performance reporting.
  owner: data-engineering-team
  contact:
    name: Data Engineering Team
    email: data-engineering@retailco.com
  tags:
    - dimension
    - store
    - geography

servers:
  production:
    type: postgres
    host: warehouse-prod.retailco.internal
    port: 5432
    database: retaildw
    schema: warehouse

models:
  dim_store:
    description: One row per retail store location
    type: table
    fields:
      store_key:
        type: bigint
        required: true
        unique: true
        primary: true
        description: Surrogate PK
        constraints:
          - type: not_null
          - type: unique

      store_id:
        type: varchar(15)
        required: true
        unique: true
        description: Business natural key — format STR[digits]
        constraints:
          - type: not_null
          - type: unique
          - type: pattern
            regex: "^STR[0-9]+$"

      store_name:
        type: varchar(80)
        required: true
        description: Store display name
        constraints:
          - type: not_null

      city:
        type: varchar(50)
        required: true
        constraints:
          - type: not_null

      state:
        type: char(2)
        required: true
        constraints:
          - type: not_null
          - type: length
            minimum: 2
            maximum: 2

      region:
        type: varchar(20)
        required: true
        description: US geographic region
        constraints:
          - type: not_null
          - type: enum
            values: [West, South, Northeast, Midwest]

      store_type:
        type: varchar(20)
        required: true
        description: Store format classification
        constraints:
          - type: not_null
          - type: enum
            values: [Standard, Express, Flagship]

      opening_date:
        type: date
        required: true
        description: Date the store opened; must not be in the future
        constraints:
          - type: not_null
          - type: range
            minimum: "2000-01-01"
            maximum: "today"   # evaluated at validation runtime

servicelevels:
  freshness:
    description: Store master refreshed monthly from facilities management system
    threshold: 30d
  completeness:
    description: All fields 100% populated
    percentage: "100%"

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial contract definition


# -----------------------------------------------------------------------------
# CONTRACT 4 OF 6 — dim_date
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:dim_date
info:
  title: Date Dimension Table
  version: 1.0.0
  description: >
    Static calendar dimension covering the warehouse's time horizon.
    One row per calendar day.  Generated once; append-only for new years.
  owner: data-engineering-team
  contact:
    name: Data Engineering Team
    email: data-engineering@retailco.com
  tags:
    - dimension
    - date
    - calendar

servers:
  production:
    type: postgres
    host: warehouse-prod.retailco.internal
    port: 5432
    database: retaildw
    schema: warehouse

models:
  dim_date:
    description: One row per calendar day
    type: table
    fields:
      date_key:
        type: integer
        required: true
        unique: true
        primary: true
        description: YYYYMMDD integer surrogate key
        constraints:
          - type: not_null
          - type: unique
          - type: range
            minimum: 20200101
            maximum: 20301231

      full_date:
        type: date
        required: true
        unique: true
        description: Calendar date (ISO 8601)
        constraints:
          - type: not_null
          - type: unique
          - type: range
            minimum: "2020-01-01"
            maximum: "2030-12-31"

      year_number:
        type: smallint
        required: true
        constraints:
          - type: not_null
          - type: range
            minimum: 2020
            maximum: 2030

      quarter_number:
        type: smallint
        required: true
        constraints:
          - type: not_null
          - type: range
            minimum: 1
            maximum: 4

      month_number:
        type: smallint
        required: true
        constraints:
          - type: not_null
          - type: range
            minimum: 1
            maximum: 12
          - type: consistency
            rule: "EXTRACT(MONTH FROM full_date) = month_number"

      month_name:
        type: varchar(10)
        required: true
        constraints:
          - type: not_null
          - type: enum
            values: [January, February, March, April, May, June,
                     July, August, September, October, November, December]

      day_of_week:
        type: smallint
        required: true
        description: ISO weekday number (1=Monday, 7=Sunday)
        constraints:
          - type: not_null
          - type: range
            minimum: 1
            maximum: 7

      day_name:
        type: varchar(10)
        required: true
        constraints:
          - type: not_null
          - type: enum
            values: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]

      is_weekend:
        type: boolean
        required: true
        constraints:
          - type: not_null

      is_holiday:
        type: boolean
        required: true
        constraints:
          - type: not_null

servicelevels:
  freshness:
    description: Static table; appended annually for the upcoming year
    threshold: 365d
  completeness:
    description: All fields 100% populated; no gaps in date range
    percentage: "100%"

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial contract definition


# -----------------------------------------------------------------------------
# CONTRACT 5 OF 6 — fact_sales
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:fact_sales
info:
  title: Retail Sales Fact Table
  version: 1.0.0
  description: >
    Transactional grain: one row per order line item.
    Primary source of truth for revenue, margin, and volume analytics.
    Loaded daily from the order management system; must arrive by 06:00 UTC.
  owner: data-engineering-team
  contact:
    name: Data Engineering Team
    email: data-engineering@retailco.com
  tags:
    - fact
    - sales
    - revenue
    - transactions

servers:
  production:
    type: postgres
    host: warehouse-prod.retailco.internal
    port: 5432
    database: retaildw
    schema: warehouse

models:
  fact_sales:
    description: One row per order line item (transactional grain)
    type: table
    fields:
      sales_key:
        type: bigint
        required: true
        unique: true
        primary: true
        description: Surrogate PK; auto-generated by ETL
        constraints:
          - type: not_null
          - type: unique

      date_key:
        type: integer
        required: true
        description: FK → dim_date.date_key (YYYYMMDD)
        references: dim_date.date_key
        constraints:
          - type: not_null
          - type: referential_integrity
            references: dim_date.date_key

      customer_key:
        type: bigint
        required: true
        description: FK → dim_customer.customer_key
        references: dim_customer.customer_key
        constraints:
          - type: not_null
          - type: referential_integrity
            references: dim_customer.customer_key

      product_key:
        type: bigint
        required: true
        description: FK → dim_product.product_key
        references: dim_product.product_key
        constraints:
          - type: not_null
          - type: referential_integrity
            references: dim_product.product_key

      store_key:
        type: bigint
        required: true
        description: FK → dim_store.store_key
        references: dim_store.store_key
        constraints:
          - type: not_null
          - type: referential_integrity
            references: dim_store.store_key

      order_id:
        type: varchar(20)
        required: true
        description: Source system order identifier
        constraints:
          - type: not_null
          - type: length
            minimum: 5
            maximum: 20

      order_line_num:
        type: smallint
        required: true
        description: Line number within the order (1-indexed)
        constraints:
          - type: not_null
          - type: range
            minimum: 1
            maximum: 100
          - type: compound_unique
            columns: [order_id, order_line_num]

      quantity:
        type: integer
        required: true
        description: Units sold; must be >= 1; returns handled in separate fact_returns table
        constraints:
          - type: not_null
          - type: range
            minimum: 1
            maximum: 10000

      unit_price:
        type: decimal(12,2)
        required: true
        description: Selling price per unit at time of transaction
        constraints:
          - type: not_null
          - type: range
            minimum: 0.01
            maximum: 100000

      unit_cost:
        type: decimal(12,2)
        required: false
        description: Cost of goods per unit; zero for complimentary items
        constraints:
          - type: range
            minimum: 0
            maximum: 100000

      discount_amount:
        type: decimal(12,2)
        required: false
        description: Total discount applied to the line; defaults 0
        constraints:
          - type: range
            minimum: 0
            maximum: 50000

      net_revenue:
        type: decimal(14,2)
        required: true
        description: Revenue after discount — must equal (quantity*unit_price) - discount_amount within 0.01
        constraints:
          - type: not_null
          - type: range
            minimum: -10000
            maximum: 10000000
          - type: formula
            rule: "ABS(net_revenue - (quantity * unit_price - discount_amount)) <= 0.01"
            tolerance: 0.01

      gross_profit:
        type: decimal(14,2)
        required: false
        description: Net revenue minus total cost — must equal net_revenue - (quantity*unit_cost) within 0.01
        constraints:
          - type: range
            minimum: -10000
            maximum: 10000000
          - type: formula
            rule: "ABS(gross_profit - (net_revenue - quantity * unit_cost)) <= 0.01"
            tolerance: 0.01

      tax_amount:
        type: decimal(12,2)
        required: false
        description: Sales tax applied to the line
        constraints:
          - type: range
            minimum: 0
            maximum: 100000

quality:
  type: great-expectations
  specification:
    suite: fact_sales_suite
    checkpoint: retail_dw_checkpoint

servicelevels:
  availability:
    description: Data available by 06:00 UTC daily
    percentage: "99.5%"
  freshness:
    description: No older than 24 hours; daily load must complete by 06:00 UTC
    threshold: 24h
  completeness:
    description: All required fields populated; no orphan FK rows
    percentage: "99.9%"
  accuracy:
    description: Revenue and profit calculations verified within 1-cent tolerance
    percentage: "99.5%"
  consistency:
    description: All FK columns reference valid dimension records
    percentage: "100%"
  volume:
    description: Daily load between 50,000 and 500,000 rows; anomaly if < 50% of 7-day rolling average
    minimum_daily_rows: 50000

rules:
  - id: R-008
    dimension: Consistency
    severity: critical
    description: customer_key must exist in dim_customer
  - id: R-009
    dimension: Consistency
    severity: critical
    description: date_key must exist in dim_date
  - id: R-010
    dimension: Consistency
    severity: critical
    description: product_key must exist in dim_product
  - id: R-011
    dimension: Consistency
    severity: critical
    description: store_key must exist in dim_store
  - id: R-012
    dimension: Validity
    severity: high
    description: quantity >= 1; returns handled in separate fact_returns table
  - id: R-013
    dimension: Accuracy
    severity: high
    description: net_revenue = quantity*unit_price - discount_amount (±0.01 tolerance)
  - id: R-014
    dimension: Accuracy
    severity: high
    description: gross_profit = net_revenue - quantity*unit_cost (±0.01 tolerance)

anomaly_detection:
  volume:
    type: statistical_threshold
    metric: daily_row_count
    baseline: 7_day_rolling_average
    alert_if: row_count < baseline * 0.5
    severity: high
  freshness:
    type: time_threshold
    metric: max_load_timestamp
    alert_if: NOW() - max_load_timestamp > INTERVAL '24 hours'
    severity: critical
  revenue_spike:
    type: statistical_threshold
    metric: daily_total_revenue
    baseline: 30_day_rolling_average
    alert_if: daily_total_revenue > baseline * 3.0
    severity: high

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial contract definition for Month 4 deliverable


# -----------------------------------------------------------------------------
# CONTRACT 6 OF 6 — dim_date (cross-table referential integrity addendum)
# This section documents the FK relationships across all contracts for
# governance tooling (e.g., OpenMetadata lineage ingestion)
# -----------------------------------------------------------------------------
---
dataContractSpecification: 0.9.3
id: urn:datacontract:retailco:referential_integrity_policy
info:
  title: Cross-Table Referential Integrity Policy
  version: 1.0.0
  description: >
    Documents all foreign-key relationships in the RetailCo gold layer.
    Used by governance and data quality tooling to automatically generate
    cross-table consistency checks.
  owner: data-engineering-team

referential_integrity:
  relationships:
    - source_table: fact_sales
      source_column: date_key
      target_table: dim_date
      target_column: date_key
      cardinality: many-to-one
      severity: critical
      rule_id: R-009

    - source_table: fact_sales
      source_column: customer_key
      target_table: dim_customer
      target_column: customer_key
      cardinality: many-to-one
      severity: critical
      rule_id: R-008

    - source_table: fact_sales
      source_column: product_key
      target_table: dim_product
      target_column: product_key
      cardinality: many-to-one
      severity: critical
      rule_id: R-010

    - source_table: fact_sales
      source_column: store_key
      target_table: dim_store
      target_column: store_key
      cardinality: many-to-one
      severity: critical
      rule_id: R-011

servicelevels:
  referential_integrity:
    description: Zero orphan FK records permitted in fact_sales at any time
    percentage: "100%"

changelog:
  - version: 1.0.0
    date: "2026-04-29"
    author: Diluksha Perera
    change: Initial cross-table integrity policy definition
