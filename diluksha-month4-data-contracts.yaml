# Author   : Diluksha Perera
# Date     : 2026-04-29
# Version  : 1.0.0
# Standard : Data Contract Specification 0.9.3 (https://datacontract.com/)
# Scope    : PostgreSQL Gold Layer — 5 dimension tables + 2 fact tables
